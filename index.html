<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محول .mcstructure إلى JSON | نسخة محلية</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #1e3c32 0%, #2a5a4a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background-color: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 1200px;
            padding: 30px;
        }
        
        h1 {
            color: #1e3c32;
            margin-bottom: 20px;
            border-bottom: 3px solid #2a5a4a;
            padding-bottom: 10px;
        }
        
        .success-box {
            background-color: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-right: 4px solid #28a745;
        }
        
        .upload-area {
            border: 3px dashed #4a6b5f;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            background-color: #f8faf9;
            cursor: pointer;
            margin-bottom: 20px;
        }
        
        .upload-area:hover {
            background-color: #e8f0ed;
        }
        
        .file-info {
            background-color: #e8f0ed;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background-color: #1e3c32;
            color: white;
        }
        
        .btn-primary:hover {
            background-color: #2a5a4a;
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background-color: #e0e8e4;
            color: #1e3c32;
        }
        
        .btn-secondary:hover {
            background-color: #c9d6d0;
        }
        
        .btn-success {
            background-color: #28a745;
            color: white;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: #f8faf9;
            border: 2px solid #2a5a4a;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
        }
        
        .stat-label {
            color: #4a6b5f;
            font-size: 0.9em;
        }
        
        .stat-value {
            color: #1e3c32;
            font-size: 1.8em;
            font-weight: bold;
        }
        
        .json-container {
            background-color: #1e1e2f;
            color: #d4d4d4;
            border-radius: 10px;
            padding: 20px;
            max-height: 500px;
            overflow: auto;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            white-space: pre-wrap;
        }
        
        .error-message {
            background-color: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-right: 4px solid #dc3545;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #1e3c32;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        footer {
            text-align: center;
            margin-top: 30px;
            color: #6b8a7c;
            padding-top: 20px;
            border-top: 2px solid #e0e8e4;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏗️ محول .mcstructure إلى JSON</h1>
        
        <div class="success-box" id="libraryStatus">
            🔍 جاري تحميل مكتبة prismarine-nbt...
        </div>
        
        <div class="upload-area" id="uploadArea">
            <div style="font-size: 48px; margin-bottom: 15px;">📂</div>
            <div style="font-size: 1.2em; color: #2a5a4a;">اضغط لرفع ملف أو اسحب وأفلت</div>
            <div style="color: #6b8a7c; margin-top: 10px;">يدعم فقط ملفات .mcstructure</div>
            <input type="file" id="fileInput" accept=".mcstructure" style="display: none;">
        </div>
        
        <div id="fileInfo" class="file-info" style="display: none;">
            <span id="fileName"></span>
            <span id="fileSize"></span>
        </div>
        
        <div id="statsContainer" class="stats-grid" style="display: none;">
            <div class="stat-card">
                <div class="stat-label">الأبعاد</div>
                <div class="stat-value" id="dimensions">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">البلوكات</div>
                <div class="stat-value" id="blockCount">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">أنواع البلوكات</div>
                <div class="stat-value" id="paletteSize">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">الكيانات</div>
                <div class="stat-value" id="entityCount">-</div>
            </div>
        </div>
        
        <div class="controls">
            <button class="btn-primary" id="convertBtn">🔄 تحويل إلى JSON</button>
            <button class="btn-success" id="downloadBtn">📥 تحميل JSON</button>
            <button class="btn-secondary" id="clearBtn">🗑️ مسح</button>
            <span id="loadingIndicator" class="loading" style="display: none;"></span>
        </div>
        
        <div id="errorMessage" class="error-message" style="display: none;"></div>
        
        <pre id="jsonOutput" class="json-container">📌 انتظر رفع الملف...</pre>
        
        <footer>
            <p>باستخدام مكتبة prismarine-nbt v2.8.0 | جميع الحقوق محفوظة © 2026</p>
        </footer>
    </div>

    <!-- استيراد المكتبة المحلية - هذا السطر رقم 168 -->
    <script src="prismarine-nbt/nbt.js"></script>
    
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        // التحقق من تحميل المكتبة
        const statusDiv = document.getElementById('libraryStatus');
        
        if (typeof nbt !== 'undefined') {
            statusDiv.innerHTML = '✅ مكتبة prismarine-nbt تم تحميلها بنجاح!';
            statusDiv.style.backgroundColor = '#d4edda';
            statusDiv.style.color = '#155724';
        } else {
            statusDiv.innerHTML = '❌ فشل تحميل المكتبة. تأكد من وجود ملف nbt.js في المسار الصحيح';
            statusDiv.style.backgroundColor = '#f8d7da';
            statusDiv.style.color = '#721c24';
        }
        
        // عناصر الصفحة
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const convertBtn = document.getElementById('convertBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const clearBtn = document.getElementById('clearBtn');
        const jsonOutput = document.getElementById('jsonOutput');
        const errorMessage = document.getElementById('errorMessage');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const statsContainer = document.getElementById('statsContainer');
        
        // عناصر الإحصائيات
        const dimensions = document.getElementById('dimensions');
        const blockCount = document.getElementById('blockCount');
        const paletteSize = document.getElementById('paletteSize');
        const entityCount = document.getElementById('entityCount');
        
        let currentFile = null;
        let currentJsonData = null;
        
        // رفع الملف
        uploadArea.addEventListener('click', () => fileInput.click());
        
        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) handleFileSelect(e.target.files[0]);
        });
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.style.backgroundColor = '#e8f0ed';
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.style.backgroundColor = '#f8faf9';
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.backgroundColor = '#f8faf9';
            if (e.dataTransfer.files[0]) handleFileSelect(e.dataTransfer.files[0]);
        });
        
        function handleFileSelect(file) {
            if (!file.name.toLowerCase().endsWith('.mcstructure')) {
                showError('الرجاء اختيار ملف بامتداد .mcstructure فقط');
                return;
            }
            
            currentFile = file;
            fileName.textContent = file.name;
            fileSize.textContent = formatFileSize(file.size);
            fileInfo.style.display = 'flex';
            statsContainer.style.display = 'none';
            currentJsonData = null;
            jsonOutput.textContent = '📁 تم تحميل الملف. اضغط على "تحويل إلى JSON"';
            hideError();
        }
        
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
        
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
            loadingIndicator.style.display = 'none';
        }
        
        function hideError() {
            errorMessage.style.display = 'none';
        }
        
        // تحويل الملف
        convertBtn.addEventListener('click', async () => {
            if (!currentFile) {
                showError('الرجاء اختيار ملف أولاً');
                return;
            }
            
            if (typeof nbt === 'undefined') {
                showError('مكتبة NBT غير متوفرة. تأكد من وجود ملف nbt.js');
                return;
            }
            
            try {
                loadingIndicator.style.display = 'inline-block';
                hideError();
                jsonOutput.textContent = '🔄 جاري تحليل الملف...';
                
                const arrayBuffer = await readFileAsArrayBuffer(currentFile);
                
                nbt.parse(arrayBuffer, (error, data) => {
                    loadingIndicator.style.display = 'none';
                    
                    if (error) {
                        showError('خطأ في فك الترميز: ' + error.message);
                        return;
                    }
                    
                    try {
                        // تنظيف البيانات
                        const cleanData = JSON.parse(JSON.stringify(data, (key, value) => {
                            if (value && value.type && value.value !== undefined) {
                                return value.value;
                            }
                            return value;
                        }));
                        
                        // إضافة معلومات إضافية
                        cleanData.fileInfo = {
                            name: currentFile.name,
                            size: formatFileSize(currentFile.size),
                            parsedAt: new Date().toISOString()
                        };
                        
                        currentJsonData = cleanData;
                        
                        // تحديث الإحصائيات
                        updateStats(cleanData);
                        
                        // عرض JSON
                        jsonOutput.textContent = JSON.stringify(cleanData, null, 2);
                        
                    } catch (e) {
                        showError('خطأ في معالجة البيانات: ' + e.message);
                    }
                });
                
            } catch (error) {
                loadingIndicator.style.display = 'none';
                showError('حدث خطأ: ' + error.message);
            }
        });
        
        function updateStats(data) {
            try {
                statsContainer.style.display = 'grid';
                
                // استخراج الأبعاد
                if (data.value && data.value.size) {
                    const size = data.value.size;
                    const x = size.x?.value || 0;
                    const y = size.y?.value || 0;
                    const z = size.z?.value || 0;
                    dimensions.textContent = `${x}×${y}×${z}`;
                }
                
                // عدد البلوكات
                if (data.value && data.value.structure && data.value.structure.block_indices) {
                    const indices = data.value.structure.block_indices;
                    if (Array.isArray(indices.value)) {
                        blockCount.textContent = indices.value.length.toLocaleString();
                    } else {
                        blockCount.textContent = '0';
                    }
                }
                
                // حجم الباليت
                if (data.value && data.value.structure && data.value.structure.palette) {
                    const palette = data.value.structure.palette;
                    if (Array.isArray(palette.value)) {
                        paletteSize.textContent = palette.value.length.toLocaleString();
                    } else {
                        paletteSize.textContent = '0';
                    }
                }
                
                // عدد الكيانات
                if (data.value && data.value.structure && data.value.structure.entities) {
                    const entities = data.value.structure.entities;
                    if (Array.isArray(entities.value)) {
                        entityCount.textContent = entities.value.length.toLocaleString();
                    } else {
                        entityCount.textContent = '0';
                    }
                }
                
            } catch (e) {
                console.log('خطأ في تحديث الإحصائيات:', e);
            }
        }
        
        function readFileAsArrayBuffer(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.onerror = () => reject(new Error('فشل قراءة الملف'));
                reader.readAsArrayBuffer(file);
            });
        }
        
        // تحميل JSON
        downloadBtn.addEventListener('click', () => {
            if (!currentJsonData) {
                showError('لا توجد بيانات للتحميل');
                return;
            }
            
            const jsonString = JSON.stringify(currentJsonData, null, 2);
            const blob = new Blob([jsonString], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = currentFile.name.replace('.mcstructure', '.json');
            a.click();
            
            URL.revokeObjectURL(url);
        });
        
        // مسح
        clearBtn.addEventListener('click', () => {
            currentFile = null;
            currentJsonData = null;
            fileInfo.style.display = 'none';
            statsContainer.style.display = 'none';
            jsonOutput.textContent = '📌 انتظر رفع الملف...';
            fileInput.value = '';
            hideError();
            loadingIndicator.style.display = 'none';
        });
    });
    </script>
</body>
</html>
