<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>رافع الهولوپرنت</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }

        .container {
            width: 100%;
            max-width: 380px;
        }

        .card {
            background: #1e293b;
            border-radius: 28px;
            padding: 20px;
            border: 1px solid #334155;
        }

        .upload-area {
            background: #0f172a;
            border-radius: 24px;
            padding: 32px 16px;
            border: 2px dashed #3b82f6;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            min-height: 180px;
        }

        .upload-area.dragover {
            border-color: #22c55e;
            background: #1a2e2a;
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 12px;
            color: #94a3b8;
        }

        .upload-text {
            color: #f1f5f9;
            font-size: 15px;
            margin-bottom: 6px;
        }

        .file-name {
            color: #94a3b8;
            font-size: 12px;
            text-align: center;
            word-break: break-all;
            max-width: 100%;
            padding: 0 8px;
        }

        .stats {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .stat {
            background: #0f172a;
            border-radius: 16px;
            padding: 12px 4px;
            flex: 1;
            text-align: center;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 600;
            color: #3b82f6;
            margin-bottom: 2px;
        }

        .stat-label {
            font-size: 10px;
            color: #94a3b8;
        }

        .log {
            background: #0f172a;
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 16px;
            height: 100px;
            overflow-y: auto;
            font-family: 'Monaco', monospace;
            font-size: 11px;
            color: #22c55e;
            border: 1px solid #334155;
        }

        .log-entry {
            padding: 3px 0;
            border-bottom: 1px solid #1e293b;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .loading {
            display: none;
            text-align: center;
            margin: 8px 0;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 2px solid #334155;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 14px 10px;
            border-radius: 26px;
            font-weight: 600;
            font-size: 14px;
            border: none;
            cursor: pointer;
            background: #334155;
            color: #f1f5f9;
        }

        .btn-primary {
            background: #3b82f6;
            color: white;
        }

        .btn-primary:active:not(:disabled) {
            background: #2563eb;
            transform: scale(0.97);
        }

        .btn-success {
            background: #22c55e;
            color: white;
        }

        .btn-success:active:not(:disabled) {
            background: #16a34a;
            transform: scale(0.97);
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .footer {
            text-align: center;
            margin-top: 12px;
            color: #334155;
            font-size: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon" id="uploadIcon">📦</div>
                <div class="upload-text" id="uploadText">اضغط أو اسحب ملف .mcpack</div>
                <div class="file-name" id="fileName"></div>
                <input type="file" id="fileInput" accept=".mcpack,application/zip" style="display: none;">
            </div>

            <div class="stats">
                <div class="stat">
                    <div class="stat-value" id="fileSize">0</div>
                    <div class="stat-label">حجم</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="coordinatesCount">0</div>
                    <div class="stat-label">إحداثيات</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="modifiedCount">0</div>
                    <div class="stat-label">تم تعديل</div>
                </div>
            </div>

            <div class="log" id="log">
                <div class="log-entry">جاهز</div>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
            </div>

            <div class="actions">
                <button class="btn btn-primary" id="processBtn" disabled>معالجة</button>
                <button class="btn btn-success" id="downloadBtn" disabled>تحميل</button>
            </div>

            <div class="footer">Donut SMP</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileName = document.getElementById('fileName');
        const uploadIcon = document.getElementById('uploadIcon');
        const uploadText = document.getElementById('uploadText');
        const logDiv = document.getElementById('log');
        const processBtn = document.getElementById('processBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const loading = document.getElementById('loading');
        const fileSizeSpan = document.getElementById('fileSize');
        const coordinatesSpan = document.getElementById('coordinatesCount');
        const modifiedSpan = document.getElementById('modifiedCount');

        let mcpackFile = null;
        let modifiedZip = null;
        let totalCoordinates = 0;
        let modifiedCoordinates = 0;

        function createDonutImage() {
            const canvas = document.createElement('canvas');
            canvas.width = 64;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#fbbf24';
            ctx.beginPath();
            ctx.arc(32, 32, 28, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#1e293b';
            ctx.beginPath();
            ctx.arc(32, 32, 12, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.font = 'bold 20px Arial';
            ctx.fillStyle = '#0f172a';
            ctx.textAlign = 'center';
            ctx.fillText('D', 32, 38);
            
            return canvas.toDataURL('image/png');
        }

        function dataURLToBlob(dataURL) {
            const parts = dataURL.split(',');
            const byteString = atob(parts[1]);
            const ab = new ArrayBuffer(byteString.length);
            const ia = new Uint8Array(ab);
            for (let i = 0; i < byteString.length; i++) {
                ia[i] = byteString.charCodeAt(i);
            }
            return new Blob([ab], { type: 'image/png' });
        }

        const donutImage = dataURLToBlob(createDonutImage());

        function addLog(text) {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.textContent = text;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
            if (logDiv.children.length > 5) {
                logDiv.removeChild(logDiv.children[0]);
            }
        }

        function updateStats() {
            coordinatesSpan.textContent = totalCoordinates;
            modifiedSpan.textContent = modifiedCoordinates;
        }

        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && (file.name.endsWith('.mcpack') || file.name.endsWith('.zip'))) {
                handleFile(file);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) handleFile(e.target.files[0]);
        });

        function handleFile(file) {
            mcpackFile = file;
            fileName.textContent = file.name;
            uploadIcon.textContent = '✅';
            uploadText.textContent = 'تم الرفع';
            fileSizeSpan.textContent = (file.size / 1024).toFixed(1);
            addLog(`✓ ${file.name}`);
            processBtn.disabled = false;
        }

        // ✅ دالة لتعديل كل الإحداثيات
        function modifyAllCoordinates(text) {
            totalCoordinates = 0;
            modifiedCoordinates = 0;
            
            // نمط للبحث عن كل الإحداثيات [X, Y, Z]
            const pattern = /\[([-]?\d+\.?\d*),\s*([-]?\d+\.?\d*),\s*([-]?\d+\.?\d*)\]/g;
            
            let newText = text.replace(pattern, (match, x, y, z) => {
                totalCoordinates++;
                
                // تحويل النص إلى أرقام وزيادة Y بمقدار 6
                let yNum = parseFloat(y);
                let newY = yNum + 6;
                
                modifiedCoordinates++;
                
                return `[${x}, ${newY}, ${z}]`;
            });
            
            return newText;
        }

        // ✅ دالة لتعديل الـ hologram_root والـ b_*_*_*
        function modifySpecialCoordinates(text) {
            // تعديل hologram_root
            text = text.replace(/"hologram_root":\s*\[([-]?\d+\.?\d*),\s*([-]?\d+\.?\d*),\s*([-]?\d+\.?\d*)\]/g, (match, x, y, z) => {
                let newY = parseFloat(y) + 6;
                return `"hologram_root": [${x}, ${newY}, ${z}]`;
            });
            
            // تعديل كل الـ b_*_*_*
            text = text.replace(/"b_[0-9]+_[0-9]+_[0-9]+":\s*\[([-]?\d+\.?\d*),\s*([-]?\d+\.?\d*),\s*([-]?\d+\.?\d*)\]/g, (match, x, y, z) => {
                let newY = parseFloat(y) + 6;
                return `${match.split('[')[0]}[${x}, ${newY}, ${z}]`;
            });
            
            return text;
        }

        // ✅ دالة التحميل المطلوبة
        function handleDownload(resultBlob, resultName) {
            if (!resultBlob) return;
            
            var fixedBlob = new Blob([resultBlob], { type: "application/octet-stream" });
            var url = URL.createObjectURL(fixedBlob);
            var a = document.createElement("a");
            a.href = url;

            var filename = resultName;

            if (filename.endsWith(".mcpack.zip"))
                filename = filename.replace(".mcpack.zip", ".mcpack");

            if (!filename.endsWith(".mcpack"))
                filename = filename.replace(/\.(zip)$/i, ".mcpack");

            a.download = filename;

            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        processBtn.addEventListener('click', async () => {
            if (!mcpackFile) return;

            totalCoordinates = 0;
            modifiedCoordinates = 0;
            
            loading.classList.add('show');
            processBtn.disabled = true;
            addLog('⚙️ جاري المعالجة...');

            try {
                const zip = new JSZip();
                const content = await mcpackFile.arrayBuffer();
                const pack = await zip.loadAsync(content);

                // 1. تعديل entity
                const entity = pack.file('entity/armor_stand.entity.json');
                if (entity) {
                    let data = await entity.async('string');
                    data = data.replace('"identifier":"minecraft:armor_stand"', '"identifier":"minecraft:minecart"');
                    pack.file('entity/armor_stand.entity.json', data);
                    addLog('✓ تم تعديل entity');
                }

                // 2. إضافة الصورة
                pack.file('pack_icon.png', donutImage);
                addLog('✓ تم إضافة الصورة');

                // 3. تعديل render controllers
                const render = pack.file('holoprint.hologram.render_controllers.json');
                if (render) {
                    let data = await render.async('string');
                    const newCode = '"geometry": "v.is_ridden = q.has_rider; v.layer_change = (v.is_ridden && !v.last_ridden) ? 1 : 0; v.last_ridden = v.is_ridden; v.hologram.layer = (v.hologram.layer ?? 0) + v.layer_change; v.idx = math.trunc(math.mod(v.hologram.layer, 1)); return Array.geometries[v.idx];"';
                    data = data.replace(/"geometry"\s*:\s*"Array\.geometries\[v\.hologram\.structure_index\]"/, newCode);
                    pack.file('holoprint.hologram.render_controllers.json', data);
                    addLog('✓ تم تعديل render');
                }

                // 4. تعديل ملف holoprint.hologram.geo.json
                const geoFile = pack.file('holoprint.hologram.geo.json');
                if (geoFile) {
                    let data = await geoFile.async('string');
                    
                    let modifiedData = modifyAllCoordinates(data);
                    modifiedData = modifySpecialCoordinates(modifiedData);
                    
                    pack.file('holoprint.hologram.geo.json', modifiedData);
                    
                    updateStats();
                    addLog(`✓ تم تعديل ${modifiedCoordinates} إحداثي`);
                    
                    if (modifiedCoordinates > 0) {
                        addLog(`📍 مثال: [0, 0, 0] ← [0, 6, 0]`);
                    }
                } else {
                    addLog('⚠️ لم يتم العثور على geo.json');
                }

                // 5. تعديل أي ملفات geometry أخرى
                const promises = [];
                pack.forEach((path, file) => {
                    if (path.includes('.geo.json') && path !== 'holoprint.hologram.geo.json') {
                        promises.push(
                            (async () => {
                                try {
                                    let data = await file.async('string');
                                    let modifiedData = modifyAllCoordinates(data);
                                    modifiedData = modifySpecialCoordinates(modifiedData);
                                    pack.file(path, modifiedData);
                                    addLog(`✓ تم تعديل ${path.split('/').pop()}`);
                                } catch (e) {}
                            })()
                        );
                    }
                });

                await Promise.all(promises);

                // حفظ الملف
                modifiedZip = await pack.generateAsync({ type: 'blob' });
                
                downloadBtn.disabled = false;
                addLog('✅ تم الانتهاء بنجاح');

            } catch (err) {
                addLog('❌ حدث خطأ: ' + err.message);
                console.error(err);
            } finally {
                loading.classList.remove('show');
            }
        });

        // استخدام دالة handleDownload للتحميل
        downloadBtn.addEventListener('click', () => {
            if (modifiedZip && mcpackFile) {
                // تجهيز اسم الملف
                let resultName = mcpackFile.name;
                if (!resultName.endsWith('.mcpack')) {
                    resultName = resultName.replace(/\.zip$/, '') + '.mcpack';
                }
                resultName = resultName.replace('.mcpack', '_modified.mcpack');
                
                // استخدام الدالة المطلوبة
                handleDownload(modifiedZip, resultName);
                addLog(`↓ جاري التحميل...`);
            }
        });
    </script>
</body>
</html>
